name: Migrate Stats

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    permissions:
      issues: read
      contents: write

    steps:
      - uses: actions/checkout@v3
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements.txt

      - name: Run migration
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: python migrate_stats.py

      - name: Update README with new stats
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: python update_readme_stats.py

      - name: Commit results
        run: |
          git config user.email "action@github.com"
          git config user.name "Game Bot"
          git add game_stats.json README.md
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "Migrate stats from issue history"
            git push origin main
          fi
